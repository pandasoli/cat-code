colors:
  key: 35
  number: 33
  boolean: 31
  value: 32
  brackets: 36
  comment: 30

regexes:
  - color: 'number'
    regex: '[0-9]+?\.[0-9]+'

  - color: 'boolean'
    regex:
      - '\bfalse\b'
      - '\btrue\b'

  - color: 'value'
    regex: '\"[a-zA-Z0-9_-]+\"'

  - color: 'key'
    regex: '[a-zA-Z0-9\"_-]+?(?=:)'

  - color: 'brackets'
    regex:
      - '\['
      - ']'
      - '{'
      - '}'
      - ':'
      - ','

  - color: 'comment'
    important: true
    regex: '//.*'
