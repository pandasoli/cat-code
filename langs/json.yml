colors:
  key: '1;35'
  number: '0;33'
  brackets: '0;30'

regexes:
  - color: 'number'
    regex: '[0-9]+?\.[0-9]+'

  - color: 'key'
    regex: '[a-zA-Z0-9\"_-]+?(?=:)'

  - color: 'brackets'
    regex: '{'

  - color: 'brackets'
    regex: '}'

  - color: 'brackets'
    regex: '\['

  - color: 'brackets'
    regex: ']'

  - color: 'brackets'
    regex: ':'

  - color: 'brackets'
    regex: ','
