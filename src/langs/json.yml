groups:

  - color: 32
    children:
      - color: 34
        regexes:
          - '\\b'
          - '\\t'
          - '\\n'
          - '\\r'
          - '\\0'
    regex: '"[a-zA-Z0-9\\_-]+"'

  - color: 33
    regex: '\b[0-9e]+(?:\.[0-9e]+)?'

  - color: 35
    regex: '"[a-zA-Z0-9\\_-]+"?(?=:)'

  - color: 31
    regexes:
      - '\bfalse'
      - '\btrue'

  - color: 34
    regexes:
      - ':'
      - '\['
      - ']'
      - '{'
      - '}'
      - ','

  - color: 30
    regexes:
      - '//.*'
      - '\/\*[a-zA-Z \n]+\*\/'
